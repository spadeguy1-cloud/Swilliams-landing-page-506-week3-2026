<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Samuel Williams profile avatar</title>
  <desc id="desc">A circular illustrated profile avatar with warm skin tones, a suit jacket, and blue frost accents.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="58%" stop-color="#172b4d"/>
      <stop offset="100%" stop-color="#050a14"/>
    </radialGradient>
    <linearGradient id="suit" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#152a4f"/>
      <stop offset="100%" stop-color="#050b18"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="120" cy="120" r="112" fill="url(#bg)"/>
  <circle cx="120" cy="120" r="108" fill="none" stroke="#aeefff" stroke-width="5" opacity="0.9"/>
