  <path d="M103 121c11 8 23 8 34 0" fill="none" stroke="#64361f" stroke-width="5" stroke-linecap="round"/>
  <path d="M44 54l14 8M180 42l-18 22M38 154l24-7M192 170l-24-16" stroke="#7fd6ff" stroke-width="5" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
